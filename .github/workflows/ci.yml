name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs on the same ref/PR when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Linux jobs run inside an ubuntu:25.10 container so the matrix gets
    # GCC 15 / Clang 20 from the distro's default apt repos. The host
    # runner stays ubuntu-24.04 (24.04 LTS apt only ships GCC 13 / Clang 18,
    # which is too old for the C++23 ranges/generator API surface this
    # repo demos). 25.10 (questing) is an interim release; the only thing
    # CI needs from it is a recent libstdc++ + clang, so the 9-month
    # support window is fine for the runner-side container.
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-24.04
            container: ubuntu:25.10
            preset: gcc-relwithdebinfo
            cc: gcc-15
            cxx: g++-15

          - name: linux-clang
            os: ubuntu-24.04
            container: ubuntu:25.10
            preset: clang-relwithdebinfo
            cc: clang-20
            cxx: clang++-20

          # Sanitizer job: Debug + ASan/UBSan via MCPP_ENABLE_SANITIZERS.
          # Catches memory / UB regressions that release-mode jobs miss.
          - name: linux-gcc-asan
            os: ubuntu-24.04
            container: ubuntu:25.10
            preset: gcc-debug
            cc: gcc-15
            cxx: g++-15
            extra-config: -DMCPP_ENABLE_SANITIZERS=ON

          # Conan path. Must pass `-s build_type=` matching the preset's
          # CMAKE_BUILD_TYPE — otherwise CMakeDeps generates per-config target
          # files for the wrong config and INTERFACE_INCLUDE_DIRECTORIES is
          # empty at build time. cmake/Dependencies.cmake catches this.
          - name: linux-gcc-conan
            os: ubuntu-24.04
            container: ubuntu:25.10
            preset: gcc-relwithdebinfo-conan
            cc: gcc-15
            cxx: g++-15
            uses-conan: true
            conan-profile: linux-gcc
            build-type: RelWithDebInfo

          - name: windows-msvc
            os: windows-2022
            preset: msvc
            build-preset: msvc-relwithdebinfo
            test-preset:  msvc-relwithdebinfo

          # clang-cl on Windows is otherwise unverified.
          - name: windows-clang-cl
            os: windows-2022
            preset: clang-cl-relwithdebinfo
            build-preset: clang-cl-relwithdebinfo
            test-preset:  clang-cl-relwithdebinfo

          # MSVC + ASan: catches Windows-specific UB / heap issues that the
          # Linux ASan job can't see (different allocator, different ABI).
          - name: windows-msvc-asan
            os: windows-2022
            preset: msvc
            build-preset: msvc-debug
            test-preset:  msvc-debug
            extra-config: -DMCPP_ENABLE_SANITIZERS=ON

          # MinGW-w64 (UCRT64) GCC via MSYS2. Validates the mingw-gcc-* preset
          # family, which targets a non-MSVC ABI (needs the x64-mingw-dynamic
          # vcpkg triplet, pinned in the preset).
          - name: windows-mingw-gcc
            os: windows-2022
            preset: mingw-gcc-relwithdebinfo
            build-preset: mingw-gcc-relwithdebinfo
            test-preset:  mingw-gcc-relwithdebinfo
            uses-msys2: true

          # macOS / Apple Clang. The clang-* presets are conditioned on
          # anyOf(Linux, Darwin); this job is what actually exercises the
          # Darwin branch and catches Apple libc++ vs libstdc++ skew before
          # contributors hit it locally. NOTE: Apple Clang's libc++ lags
          # the C++23 ranges/views surface significantly — modules that
          # use those features should `try_compile`-gate them rather than
          # relying on this job to validate them.
          - name: macos-clang
            os: macos-14
            preset: clang-relwithdebinfo
            cc: clang
            cxx: clang++

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Toolchain
      #   Linux  — apt-install GCC/Clang inside the ubuntu:25.10 container
      #            (running as root, so no sudo). Each Linux matrix entry
      #            installs the same superset (g++-15 + clang-20 + ninja +
      #            ccache + vcpkg/conan deps) so this step is reused. The
      #            preset and matrix.cc/cxx pick which compiler is invoked.
      #   Windows — rely on VS dev cmd (or MSYS2 for the MinGW job)
      #   macOS  — Apple Clang ships preinstalled, install Ninja via brew
      # ------------------------------------------------------------------
      - name: Install toolchain (Linux container)
        if: runner.os == 'Linux'
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            g++-15 \
            clang-20 lld-20 \
            ninja-build ccache \
            git curl zip unzip tar pkg-config ca-certificates \
            python3 python3-pip

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows, non-MinGW)
        if: runner.os == 'Windows' && !matrix.uses-msys2
        run: choco install ninja -y

      # ccache speeds up repeat configures on the same matrix entry. We expose
      # it via CMAKE_<LANG>_COMPILER_LAUNCHER on the Configure step (set there,
      # not here, so it's local to that step). Skipped on Windows: MSVC cl.exe
      # isn't compatible with ccache, and the MinGW path uses its own MSYS2
      # toolchain that's awkward to wire up.
      - name: Setup ccache (Linux/macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.name }}-${{ matrix.preset }}
          max-size: 500M

      - name: Setup MSVC dev environment
        if: runner.os == 'Windows' && !matrix.uses-msys2
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # MinGW path: install MSYS2 UCRT64 with GCC + Ninja + CMake. The
      # mingw-gcc-* preset expects gcc/g++ on PATH and Ninja generator;
      # subsequent cmake/build/test steps for this matrix entry run inside
      # the msys2 shell so the UCRT64 bin dir takes precedence.
      - name: Setup MSYS2 (UCRT64)
        if: matrix.uses-msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      # ------------------------------------------------------------------
      # Conan (only for jobs with uses-conan: true)
      # ------------------------------------------------------------------
      - name: Setup Python (Conan)
        if: matrix.uses-conan && runner.os != 'Linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        if: matrix.uses-conan
        run: |
          pip install --upgrade --break-system-packages conan
          # Default profile is required as Conan's --profile:build (used to
          # compile build-tools), even when --profile:host points at a vendored
          # profile under conan/profiles/. detect --force initialises it from
          # whatever compiler is on PATH; that's fine because matrix.cc/.cxx
          # are exported into the env below.
          conan profile detect --force

      - name: Conan install
        if: matrix.uses-conan
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          conan install . \
            --profile:host=./conan/profiles/${{ matrix.conan-profile }} \
            --output-folder=build/${{ matrix.preset }} \
            --build=missing \
            -s build_type=${{ matrix.build-type }}

      # ------------------------------------------------------------------
      # vcpkg: bootstrap once, cache binaries via GitHub Actions cache
      # (Skipped for Conan jobs — they don't touch vcpkg.)
      # ------------------------------------------------------------------
      - name: Setup vcpkg
        if: '!matrix.uses-conan'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '5ee5eee0d3e9c6098b24d263e9099edcdcef6631'

      # Triplet selection is pinned in CMakePresets.json on Windows; on Linux
      # vcpkg auto-detects from the host (x64-linux). No env override needed.

      # ------------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------------
      - name: Configure (Linux / macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          # CMake honors CMAKE_<LANG>_COMPILER_LAUNCHER as an env var at
          # configure time (CMake 3.22+), so this routes every compile through
          # ccache without changing the preset's CMAKE_C_COMPILER setting.
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.extra-config }}

      - name: Configure (Windows)
        if: runner.os == 'Windows' && !matrix.uses-msys2
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        shell: pwsh
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.extra-config }}

      - name: Configure (Windows, MSYS2/UCRT64)
        if: matrix.uses-msys2
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        shell: msys2 {0}
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.extra-config }}

      # ------------------------------------------------------------------
      # Build & test
      # ------------------------------------------------------------------
      - name: Build (Linux / macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test (Linux / macOS)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        # _test-base preset already sets outputOnFailure:true; we add --parallel
        # so ctest fans out across the runner's cores, and --output-junit so the
        # PR page can surface per-test results via the upload-artifact step below.
        run: ctest --preset ${{ matrix.preset }} --parallel 4 --output-junit ctest-results.xml

      - name: Build (Windows)
        if: runner.os == 'Windows' && !matrix.uses-msys2
        shell: pwsh
        run: cmake --build --preset ${{ matrix.build-preset || matrix.preset }} --parallel

      - name: Test (Windows)
        if: runner.os == 'Windows' && !matrix.uses-msys2
        shell: pwsh
        run: ctest --preset ${{ matrix.test-preset || matrix.preset }} --parallel 4 --output-junit ctest-results.xml

      - name: Build (Windows, MSYS2/UCRT64)
        if: matrix.uses-msys2
        shell: msys2 {0}
        run: cmake --build --preset ${{ matrix.build-preset || matrix.preset }} --parallel

      - name: Test (Windows, MSYS2/UCRT64)
        if: matrix.uses-msys2
        shell: msys2 {0}
        run: ctest --preset ${{ matrix.test-preset || matrix.preset }} --parallel 4 --output-junit ctest-results.xml

      # Upload the JUnit XML even on test failure so reviewers can see exactly
      # which cases failed without scrolling through the raw build log.
      - name: Upload ctest JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results-${{ matrix.name }}
          path: ${{ github.workspace }}/build/${{ matrix.preset }}/ctest-results.xml
          if-no-files-found: ignore

  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-24.04
    container: ubuntu:25.10
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4

      # The lint job uses the clang-relwithdebinfo preset on purpose: clang-20
      # together with libstdc++ from g++-15 sees the full C++23 stdlib surface
      # (std::expected, std::generator, ranges::to, etc.), so try_compile
      # guards in the modules don't skip targets out of compile_commands.json
      # — that keeps clang-tidy's input set complete.
      - name: Install toolchain (clang-20, g++-15, ninja, clang-format-20, clang-tidy-20)
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            clang-20 lld-20 g++-15 ninja-build \
            clang-format-20 clang-tidy-20 \
            git curl zip unzip tar pkg-config ca-certificates

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '5ee5eee0d3e9c6098b24d263e9099edcdcef6631'

      # Configure + a no-op build: configure produces compile_commands.json,
      # the format-check / tidy-check targets read it. We don't need to build
      # any compiled targets to lint, so go straight to the lint targets.
      - name: Configure
        env:
          CC:  clang-20
          CXX: clang++-20
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --preset clang-relwithdebinfo

      - name: clang-format (dry-run)
        run: cmake --build --preset clang-relwithdebinfo --target format-check

      - name: clang-tidy
        run: cmake --build --preset clang-relwithdebinfo --target tidy-check

  required-ci:
    name: required-ci
    runs-on: ubuntu-24.04
    if: ${{ always() }}
    needs:
      - build-test
      - lint
    steps:
      - name: Aggregate upstream job results
        env:
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
        run: |
          echo "build-test: ${BUILD_TEST_RESULT}"
          echo "lint: ${LINT_RESULT}"

          if [ "${BUILD_TEST_RESULT}" != "success" ] || [ "${LINT_RESULT}" != "success" ]; then
            echo "::error::required-ci failed because at least one upstream job did not succeed."
            exit 1
          fi

          echo "required-ci passed: all upstream jobs succeeded."
