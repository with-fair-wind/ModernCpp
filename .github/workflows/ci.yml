name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs on the same ref/PR when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-24.04
            preset: gcc-relwithdebinfo
            cc: gcc-13
            cxx: g++-13
            triplet: x64-linux

          - name: linux-clang
            os: ubuntu-24.04
            preset: clang-relwithdebinfo
            cc: clang-18
            cxx: clang++-18
            triplet: x64-linux

          - name: windows-msvc
            os: windows-2022
            preset: msvc
            build-preset: msvc-relwithdebinfo
            test-preset:  msvc-relwithdebinfo
            triplet: x64-windows

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Toolchain (Linux: install desired GCC/Clang; Windows: rely on VS)
      # ------------------------------------------------------------------
      - name: Install GCC 13 (Linux)
        if: matrix.name == 'linux-gcc'
        run: sudo apt-get update && sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Install Clang 18 (Linux)
        if: matrix.name == 'linux-clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 ninja-build
          # libstdc++-13 needed for full C++23 library support
          sudo apt-get install -y g++-13

      - name: Install Ninja (Windows MSVC preset uses VS generator, but vcpkg likes ninja around)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Setup MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ------------------------------------------------------------------
      # vcpkg: bootstrap once, cache binaries via GitHub Actions cache
      # ------------------------------------------------------------------
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '5ee5eee0d3e9c6098b24d263e9099edcdcef6631'

      - name: Set VCPKG_DEFAULT_TRIPLET
        shell: bash
        run: echo "VCPKG_DEFAULT_TRIPLET=${{ matrix.triplet }}" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # Configure
      # ------------------------------------------------------------------
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure (Windows MSVC)
        if: runner.os == 'Windows'
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        shell: pwsh
        run: cmake --preset ${{ matrix.preset }}

      # ------------------------------------------------------------------
      # Build & test
      # ------------------------------------------------------------------
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: ctest --preset ${{ matrix.preset }}

      - name: Build (Windows MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build --preset ${{ matrix.build-preset }} --parallel

      - name: Test (Windows MSVC)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --preset ${{ matrix.test-preset }}

  lint:
    name: clang-format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format 18
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: Verify formatting
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.hpp' '*.h' '*.cc' '*.cxx')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No C++ sources to check."
            exit 0
          fi
          clang-format-18 --dry-run --Werror "${files[@]}"
